# Opções da JVM do Gradle. 2 GB chega para um projeto Compose deste tamanho.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Builds em paralelo e cache para acelerar compilações incrementais.
org.gradle.parallel=true
org.gradle.caching=true

# AndroidX é obrigatório (Jetpack).
android.useAndroidX=true

# Kotlin code style oficial.
kotlin.code.style=official

# Gera apenas as classes R por módulo (mais rápido, menos memória).
android.nonTransitiveRClass=true

# O caminho do projeto contem caracteres nao-ASCII (Codigo) -> permitir o build
android.overridePathCheck=true
